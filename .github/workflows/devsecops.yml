name: ci-devsecops-pai4

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

env:
  TARGET_CODE_PATH: target/my-pass
  TARGET_REPOSITORY_URL: https://github.com/josemgarciar/my-pass.git
  TARGET_DAST_URL: http://127.0.0.1:19006
  TARGET_WEB_PORT: "19006"

jobs:
  sast:
    name: sast
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Prepare my-pass target source
        run: |
          mkdir -p "$(dirname "$TARGET_CODE_PATH")"
          if [ ! -d "$TARGET_CODE_PATH/.git" ] && [ ! -f "$TARGET_CODE_PATH/package.json" ]; then
            git clone --depth 1 "$TARGET_REPOSITORY_URL" "$TARGET_CODE_PATH"
          fi
          test -f "$TARGET_CODE_PATH/package.json"

      - name: SAST - Semgrep
        run: |
          docker run --rm \
            -v "${PWD}:/src" \
            returntocorp/semgrep:latest \
            semgrep scan --no-git-ignore --config /src/scripts/semgrep-rules.yml --json -o /src/reports/semgrep.json /src/$TARGET_CODE_PATH || true

      - name: Positive control - Semgrep detection
        run: |
          docker run --rm \
            -v "${PWD}:/src" \
            returntocorp/semgrep:latest \
            semgrep scan --no-git-ignore --config /src/scripts/semgrep-rules.yml --json -o /src/reports/semgrep-positive-control.json /src/scripts/positive_controls
          python3 - <<'PY'
          import json
          import sys

          with open("reports/semgrep-positive-control.json", "r", encoding="utf-8") as f:
              payload = json.load(f)

          findings = payload.get("results", [])
          count = len(findings) if isinstance(findings, list) else 0
          print(f"Semgrep positive control findings: {count}")
          if count < 1:
              print("Expected at least one finding in semgrep positive control.")
              sys.exit(1)
          PY

      - name: Upload SAST reports
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          if-no-files-found: warn
          path: |
            reports/semgrep.json
            reports/semgrep-positive-control.json

  sca_iac:
    name: sca_iac
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Prepare my-pass target source
        run: |
          mkdir -p "$(dirname "$TARGET_CODE_PATH")"
          if [ ! -d "$TARGET_CODE_PATH/.git" ] && [ ! -f "$TARGET_CODE_PATH/package.json" ]; then
            git clone --depth 1 "$TARGET_REPOSITORY_URL" "$TARGET_CODE_PATH"
          fi
          test -f "$TARGET_CODE_PATH/package.json"

      - name: Install target dependencies
        run: |
          npm ci --prefix "$TARGET_CODE_PATH"

      - name: SCA - npm audit
        run: |
          cd "$TARGET_CODE_PATH"
          npm audit --json > "$GITHUB_WORKSPACE/reports/npm-audit.json" || true

      - name: IaC - Trivy config scan
        run: |
          docker run --rm \
            -v "${PWD}:/src" \
            aquasec/trivy:0.69.3 \
            config /src/$TARGET_CODE_PATH --format json --output /src/reports/trivy-config.json || true

      - name: Upload SCA/IaC reports
        uses: actions/upload-artifact@v4
        with:
          name: sca-iac-reports
          if-no-files-found: warn
          path: |
            reports/npm-audit.json
            reports/trivy-config.json

  dast:
    name: dast
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Prepare my-pass target source
        run: |
          mkdir -p "$(dirname "$TARGET_CODE_PATH")"
          if [ ! -d "$TARGET_CODE_PATH/.git" ] && [ ! -f "$TARGET_CODE_PATH/package.json" ]; then
            git clone --depth 1 "$TARGET_REPOSITORY_URL" "$TARGET_CODE_PATH"
          fi
          test -f "$TARGET_CODE_PATH/package.json"

      - name: Install target dependencies
        run: |
          npm ci --prefix "$TARGET_CODE_PATH"

      - name: Start my-pass web target
        run: |
          pushd "$TARGET_CODE_PATH"
          npx expo export --platform web
          python -m http.server "$TARGET_WEB_PORT" -d dist > "$GITHUB_WORKSPACE/reports/target-web.log" 2>&1 &
          echo $! > "$GITHUB_WORKSPACE/reports/target-web.pid"
          popd
          for i in {1..30}; do
            echo "Waiting for my-pass web target ($i/30)"
            if curl -fsS "$TARGET_DAST_URL" > reports/dast-readiness.html; then
              echo "my-pass target is ready"
              break
            fi
            sleep 2
          done
          test -s reports/dast-readiness.html

      - name: DAST - OWASP ZAP baseline
        run: |
          docker run --rm --network=host -v "${PWD}/reports:/zap/wrk/:rw" -v "${PWD}/zap-rules.tsv:/zap/rules/zap-rules.tsv:ro" ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t "$TARGET_DAST_URL" -J zap.json -r zap.html -c /zap/rules/zap-rules.tsv -I 2>&1 | tee reports/zap-baseline.log

      - name: Stop my-pass web target
        if: ${{ always() }}
        run: |
          if [ -f reports/target-web.pid ]; then
            kill "$(cat reports/target-web.pid)" || true
          fi

      - name: Upload DAST reports
        uses: actions/upload-artifact@v4
        with:
          name: dast-reports
          if-no-files-found: warn
          path: |
            reports/zap.json
            reports/zap.html
            reports/zap-baseline.log
            reports/target-web.log
            reports/dast-readiness.html

  positive_controls:
    name: positive_controls
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run positive controls for all tools
        run: |
          python scripts/run_positive_controls.py

      - name: Upload positive-controls reports
        uses: actions/upload-artifact@v4
        with:
          name: positive-controls-reports
          if-no-files-found: warn
          path: |
            reports/semgrep-positive-control-alltools.json
            reports/npm-audit-positive-control.json
            reports/trivy-positive-control.json
            reports/zap-positive-control.json
            reports/zap-positive-control.html
            reports/zap-positive-control.log

  deploy_staging:
    name: deploy_staging
    needs: [sast, sca_iac, dast]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Prepare my-pass target source
        run: |
          mkdir -p "$(dirname "$TARGET_CODE_PATH")"
          if [ ! -d "$TARGET_CODE_PATH/.git" ] && [ ! -f "$TARGET_CODE_PATH/package.json" ]; then
            git clone --depth 1 "$TARGET_REPOSITORY_URL" "$TARGET_CODE_PATH"
          fi
          test -f "$TARGET_CODE_PATH/package.json"

      - name: Build my-pass web bundle
        run: |
          npm ci --prefix "$TARGET_CODE_PATH"
          cd "$TARGET_CODE_PATH"
          npx expo export --platform web

      - name: Deploy container (staging)
        run: |
          docker run -d --name pai4-web-staging -p 8000:80 -v "${PWD}/${TARGET_CODE_PATH}/dist:/usr/share/nginx/html:ro" nginx:stable-alpine

      - name: Smoke test deployment
        run: |
          for i in {1..30}; do
            echo "Waiting for staging app ($i/30)"
            if curl -fsS http://127.0.0.1:8000 > reports/deploy-health.html; then
              echo "Staging app is ready"
              break
            fi
            sleep 2
          done
          test -s reports/deploy-health.html

      - name: Collect deployment evidence
        if: ${{ always() }}
        run: |
          {
            echo "=== docker ps ==="
            docker ps -a
            echo
            echo "=== container logs ==="
            docker logs pai4-web-staging 2>&1 || true
          } > reports/deploy-staging.log

      - name: Upload deployment reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: deploy-reports
          if-no-files-found: warn
          path: |
            reports/deploy-health.html
            reports/deploy-staging.log

      - name: Cleanup staging container
        if: ${{ always() }}
        run: docker rm -f pai4-web-staging || true

  defectdojo:
    name: defectdojo
    needs: [sast, sca_iac, dast]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DEFECTDOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
      DEFECTDOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
      DEFECTDOJO_ENGAGEMENT_ID: ${{ secrets.DEFECTDOJO_ENGAGEMENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Download stage reports
        uses: actions/download-artifact@v4
        with:
          pattern: "*-reports"
          path: reports
          merge-multiple: true

      - name: Import findings in DefectDojo
        if: ${{ env.DEFECTDOJO_URL != '' && env.DEFECTDOJO_API_KEY != '' && env.DEFECTDOJO_ENGAGEMENT_ID != '' }}
        run: |
          python scripts/import_to_defectdojo.py --url "$DEFECTDOJO_URL" --api-key "$DEFECTDOJO_API_KEY" --engagement-id "$DEFECTDOJO_ENGAGEMENT_ID" --scan-type "NPM Audit Scan" --report reports/npm-audit.json --response-out reports/defectdojo-import-npm-audit.json || true
          python scripts/import_to_defectdojo.py --url "$DEFECTDOJO_URL" --api-key "$DEFECTDOJO_API_KEY" --engagement-id "$DEFECTDOJO_ENGAGEMENT_ID" --scan-type "Semgrep JSON Report" --report reports/semgrep.json --response-out reports/defectdojo-import-semgrep.json || true
          python scripts/import_to_defectdojo.py --url "$DEFECTDOJO_URL" --api-key "$DEFECTDOJO_API_KEY" --engagement-id "$DEFECTDOJO_ENGAGEMENT_ID" --scan-type "Trivy Scan" --report reports/trivy-config.json --response-out reports/defectdojo-import-trivy.json || true
          python scripts/import_to_defectdojo.py --url "$DEFECTDOJO_URL" --api-key "$DEFECTDOJO_API_KEY" --engagement-id "$DEFECTDOJO_ENGAGEMENT_ID" --scan-type "ZAP Scan" --report reports/zap.json --response-out reports/defectdojo-import-zap.json || true

      - name: Export DefectDojo summary
        if: ${{ env.DEFECTDOJO_URL != '' && env.DEFECTDOJO_API_KEY != '' && env.DEFECTDOJO_ENGAGEMENT_ID != '' }}
        run: |
          python scripts/export_defectdojo_summary.py --url "$DEFECTDOJO_URL" --api-key "$DEFECTDOJO_API_KEY" --engagement-id "$DEFECTDOJO_ENGAGEMENT_ID" --output reports/defectdojo-summary.json || true

      - name: Upload DefectDojo reports
        if: ${{ env.DEFECTDOJO_URL != '' && env.DEFECTDOJO_API_KEY != '' && env.DEFECTDOJO_ENGAGEMENT_ID != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: defectdojo-reports
          if-no-files-found: warn
          path: |
            reports/defectdojo-import-*.json
            reports/defectdojo-summary.json

  reports_bundle:
    name: reports_bundle
    needs: [sast, sca_iac, dast, positive_controls, deploy_staging, defectdojo]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          pattern: "*-reports"
          path: reports
          merge-multiple: true

      - name: Upload combined reports
        uses: actions/upload-artifact@v4
        with:
          name: devsecops-reports
          path: reports/
          if-no-files-found: warn
