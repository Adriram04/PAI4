rules:
  - id: pai4.javascript.eval-detected
    message: "Use of eval() detected. Avoid evaluating dynamic input."
    severity: ERROR
    languages:
      - javascript
      - typescript
    pattern: eval(...)
    metadata:
      category: security
      control: positive-detection

  - id: pai4.javascript.new-function-detected
    message: "Use of Function constructor detected. It can execute dynamic code."
    severity: WARNING
    languages:
      - javascript
      - typescript
    pattern: new Function(...)
    metadata:
      category: security
      control: sast-target
