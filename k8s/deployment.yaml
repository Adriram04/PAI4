apiVersion: apps/v1
kind: Deployment
metadata:
  name: pai4-web
  namespace: pai4
  labels:
    app: pai4-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pai4-web
  template:
    metadata:
      labels:
        app: pai4-web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: pai4-web:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
